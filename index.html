<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- Viewport: viewport-fit=cover required so content can extend under
       the iPhone notch / Dynamic Island (combined with safe-area-inset
       padding in the app CSS). -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Voyage Japon 2026</title>
  <meta name="description" content="Itinéraire détaillé du voyage au Japon — 27 avril au 11 mai 2026" />

  <!-- Color scheme: theme_color matches the dark red header. -->
  <meta name="theme-color" content="#7B0000" />
  <meta name="color-scheme" content="light dark" />

  <!-- ─── iOS / Safari PWA ─── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Japon 2026" />
  <!-- iOS falls back to any icon it can find; we point to icon-192.png
       until a dedicated 180x180 apple-touch-icon.png is added. -->
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- ─── Android / Chrome PWA ─── -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Voyage Japon 2026" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

  <!-- Initial paint: red gradient loader, avoids flash of white while Vite loads. -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #F7F4EF;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #0D0D0D; }
    }
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: linear-gradient(135deg, #7B0000 0%, #B0000A 60%, #CC2020 100%);
      color: white;
      z-index: 9999;
      transition: opacity 0.3s;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    #initial-loader.hidden { opacity: 0; pointer-events: none; }
    #initial-loader .emoji { font-size: 3rem; }
    #initial-loader .title { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.05em; }
    #initial-loader .sub { font-size: 0.78rem; opacity: 0.75; }
    #initial-loader .spin {
      width: 26px; height: 26px;
      border: 3px solid rgba(255,255,255,0.22);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-top: 0.3rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="initial-loader">
      <div class="emoji">🗾</div>
      <div class="title">Voyage Japon 2026</div>
      <div class="sub">Chargement de l'itinéraire…</div>
      <div class="spin"></div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Remove the loader shortly after mount so the user sees branding
    // instead of a flash of nothing.
    setTimeout(() => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 400);
      }
    }, 150);
  </script>
</body>
</html>
