<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hors-ligne — Voyage Japon 2026</title>
  <meta name="theme-color" content="#0D1B3F">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #0A1428 0%, #0D1B3F 45%, #1B3A68 100%);
      color: #F3EEE0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .wrap { max-width: 340px; }
    .emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { font-size: 0.9rem; line-height: 1.5; opacity: 0.9; margin: 0 0 1.25rem; }
    button {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
    }
    button:active { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🗾</div>
    <h1>Hors-ligne</h1>
    <p>
      Pas de connexion internet, et cette page n'est pas encore dans le
      cache hors-ligne. Ouvrez l'app au moins une fois avec du wifi pour
      pouvoir la consulter partout ensuite.
    </p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
