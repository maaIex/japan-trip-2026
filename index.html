<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Voyage Japon 2026</title>

  <!-- Theme color: matches the dark red header -->
  <meta name="theme-color" content="#7B0000">
  <meta name="color-scheme" content="light dark">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Japon 2026">

  <!-- Android PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Voyage Japon 2026">

  <!-- Manifest + icons -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- Description -->
  <meta name="description" content="Itinéraire détaillé du voyage au Japon — 27 avril au 11 mai 2026">

  <style>
    /* Inline critical styles so something is shown even if app.js is slow to load */
    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #F7F4EF;
      color: #1F2937;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #0D0D0D; color: #F1F0EE; }
    }
    #root { min-height: 100vh; }

    /* Loading screen shown until React mounts */
    .initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: linear-gradient(135deg, #7B0000 0%, #B0000A 60%, #CC2020 100%);
      color: white;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    .initial-loader.hidden { opacity: 0; pointer-events: none; }
    .initial-loader-emoji { font-size: 3rem; }
    .initial-loader-title {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .initial-loader-sub {
      font-size: 0.8rem;
      opacity: 0.7;
    }
    .initial-loader-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-top: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="initial-loader" id="initial-loader">
      <div class="initial-loader-emoji">🗾</div>
      <div class="initial-loader-title">Voyage Japon 2026</div>
      <div class="initial-loader-sub">Chargement de l'itinéraire…</div>
      <div class="initial-loader-spinner"></div>
    </div>
  </div>

  <!-- React 18 from unpkg (cached by service worker after first load) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- App bundle -->
  <script src="app.js"></script>

  <script>
    // Hide the initial loader once React has mounted (react replaces #root contents)
    setTimeout(() => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 400);
      }
    }, 100);
  </script>
</body>
</html>
