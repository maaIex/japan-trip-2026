<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hors-ligne — Voyage Japon 2026</title>
  <meta name="theme-color" content="#7B0000">
  <style>
    html, body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #7B0000 0%, #B0000A 60%, #CC2020 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card {
      max-width: 420px;
      text-align: center;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { font-size: 0.9rem; line-height: 1.5; margin: 0.5rem 0; opacity: 0.9; }
    .button {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🗾</div>
    <h1>Voyage Japon 2026</h1>
    <p>L'application n'a pas pu se charger.</p>
    <p style="font-size:0.78rem; opacity:0.7; margin-top:1rem;">Si c'est ta première visite, connecte-toi à Internet pour télécharger l'app. Une fois installée, elle marchera sans connexion.</p>
    <a href="./" class="button">Réessayer</a>
  </div>
</body>
</html>
